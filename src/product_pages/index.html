<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Product Make and Name</title>

    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

    <main class="divider">
      <section class="product-detail">
        <h2>Brand Name</h2>

        <h3 class="divider">Product</h3>

        <img
          src="../images/camping-products.jpg"
          alt="Sleep Outside Camping Products"
          id="productImage"
          class="divider"
        />

        <p id="productDiscount" class="product-detail__discount" hidden></p>

        <p id="productPrice" class="product-card__price">$000.99</p>

        <p id="productColor" class="product__color">Color</p>

        <p id="productDesc" class="product__description">Description</p>

        <div class="product-detail__actions">
          <button id="addToCart" data-id="productId">Add to Cart</button>
          <button id="addToWishlist" type="button">Add to Wishlist</button>
        </div>

        <section class="product-comments" aria-labelledby="product-comments-title">
          <h4 id="product-comments-title">Customer Comments</h4>

          <form id="productCommentForm" class="product-comments__form">
            <label for="commentName">Name</label>
            <input id="commentName" name="name" type="text" minlength="2" required />

            <label for="commentText">Comment</label>
            <textarea id="commentText" name="comment" rows="4" minlength="3" required></textarea>

            <button type="submit">Post Comment</button>
          </form>

          <ul id="productComments" class="product-comments__list"></ul>
        </section>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
